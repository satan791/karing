name: flutter_inappwebview_linux
description: Stub Linux implementation used to avoid WebKit/WPE build dependency for unsupported Linux webview.
version: 0.1.0-beta.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: FlutterInappwebviewLinuxPlugin
